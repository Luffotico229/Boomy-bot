<svg width="100%" height="200" viewBox="0 0 1200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title {
        font-family: 'Arial Black', sans-serif;
        font-size: 80px;
        fill: #00aaff;
        text-shadow:
          0 0 10px #00ffff,
          0 0 20px #00ffff,
          0 0 30px #00ffff,
          0 0 40px #00ffff;
      }
      .glow {
        fill: none;
        stroke: #00ffff;
        stroke-width: 3;
        filter: drop-shadow(0 0 10px #00ffff);
      }
    </style>
  </defs>

  <!-- Glow border -->
  <rect x="10" y="10" width="1180" height="180" rx="15" class="glow"/>

  <!-- Text -->
  <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" class="title">
    BOOMY BOT
  </text>
</svg>

